name: render-readme

on:
  push:
    branches: [main]
    paths:
      - README.Rmd
      - .github/workflows/render-readme.yml
  pull_request:
    paths:
      - README.Rmd
      - README.md
      - .github/workflows/render-readme.yml

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            rmarkdown
            knitr
            lubridate

      - name: Render README.Rmd
        run: Rscript -e 'rmarkdown::render("README.Rmd", quiet = TRUE)'

      - name: Check README.md is up to date (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error::README.md is out of sync with README.Rmd. Re-render locally with rmarkdown::render('README.Rmd') and commit the result."
            exit 1
          fi

      - name: Commit rendered README.md (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- README.md; then
            echo "README.md already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "Auto-render README.md from README.Rmd"
            git push
          fi
